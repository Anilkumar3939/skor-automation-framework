[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test* *Test *ScreenTest
python_functions = test_*
addopts = --alluredir=allure-results -v --tb=short
# Explicitly prevent collection from other directories if any exist, 
# although 'testpaths' should handle this.
norecursedirs = .* venv .git __pycache__ allure-report allure-results
